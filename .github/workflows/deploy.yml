name: 每日安全扫描部署

on:
  schedule:
    # 北京时间 ~5:23 (UTC+8 → UTC 21:23，避开整点高峰)
    - cron: '23 21 * * *'
    # 北京时间 ~12:23 (UTC+8 → UTC 4:23)
    - cron: '23 4 * * *'
    # 北京时间 ~22:23 (UTC+8 → UTC 14:23)
    - cron: '23 14 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests cos-python-sdk-v5

      - name: 生成 config.ini
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          cat > config.ini << 'CONFEOF'
          [GitHub]
          token = GITHUB_TOKEN_PLACEHOLDER

          [LLM]
          api_key = LLM_API_KEY_PLACEHOLDER
          api_base = LLM_API_BASE_PLACEHOLDER
          model = LLM_MODEL_PLACEHOLDER

          [Proxy]
          http =
          https =

          [Deploy]
          max_pipeline_retries = 3
          llm_analysis_min_ratio = 0.8
          alert_webhook_url = ALERT_WEBHOOK_PLACEHOLDER

          [COS]
          bucket = COS_BUCKET_PLACEHOLDER
          region = COS_REGION_PLACEHOLDER
          CONFEOF

          # 替换占位符
          sed -i "s|GITHUB_TOKEN_PLACEHOLDER|${GH_PAT}|g" config.ini
          sed -i "s|LLM_API_KEY_PLACEHOLDER|${LLM_API_KEY}|g" config.ini
          sed -i "s|LLM_API_BASE_PLACEHOLDER|${LLM_API_BASE}|g" config.ini
          sed -i "s|LLM_MODEL_PLACEHOLDER|${LLM_MODEL}|g" config.ini
          sed -i "s|ALERT_WEBHOOK_PLACEHOLDER|${ALERT_WEBHOOK_URL:-}|g" config.ini
          sed -i "s|COS_BUCKET_PLACEHOLDER|${COS_BUCKET:-}|g" config.ini
          sed -i "s|COS_REGION_PLACEHOLDER|${COS_REGION:-ap-shanghai}|g" config.ini

      - name: 从 COS 下载今日已有数据
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          echo "📥 尝试从 COS 下载今日已有数据: $TODAY"

          python3 -c "
          import os
          from qcloud_cos import CosConfig, CosS3Client

          secret_id = os.environ['COS_SECRET_ID']
          secret_key = os.environ['COS_SECRET_KEY']
          bucket = os.environ['COS_BUCKET']
          region = os.environ['COS_REGION']

          if not secret_id or not secret_key or not bucket:
              print('COS 凭证未配置，跳过下载')
              exit(0)

          config = CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key)
          client = CosS3Client(config)

          today = '$TODAY'
          os.makedirs('data', exist_ok=True)

          for ext in ['.json', '.js']:
              cos_key = f'data/{today}{ext}'
              local_path = f'data/{today}{ext}'
              try:
                  resp = client.get_object(Bucket=bucket, Key=cos_key)
                  with open(local_path, 'wb') as f:
                      f.write(resp['Body'].get_raw_stream().read())
                  size = os.path.getsize(local_path)
                  print(f'  ✅ 已下载 {cos_key} ({size} bytes)')
              except Exception:
                  print(f'  ⏭️  {cos_key} 不存在（今日首次运行）')
          "

      - name: 运行爬虫
        id: crawl
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          set +e
          python3 crawl.py
          CRAWL_EXIT=$?
          set -e

          TODAY=$(date '+%Y-%m-%d')
          if [ $CRAWL_EXIT -ne 0 ]; then
            echo "::warning::crawl.py 退出码 $CRAWL_EXIT"
          fi

          if [ -f "data/${TODAY}.json" ]; then
            SIZE=$(wc -c < "data/${TODAY}.json")
            ITEMS=$(python3 -c "import json; print(len(json.load(open('data/${TODAY}.json')).get('items',[])))")
            echo "📊 数据文件: ${SIZE} bytes, ${ITEMS} 条"
            echo "items_count=${ITEMS}" >> $GITHUB_OUTPUT
            echo "data_exists=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::数据文件未生成"
            echo "data_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 上传到 COS
        if: steps.crawl.outputs.data_exists == 'true'
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          echo "📤 上传文件到 COS..."

          python3 -c "
          import os, mimetypes
          from qcloud_cos import CosConfig, CosS3Client

          secret_id = os.environ['COS_SECRET_ID']
          secret_key = os.environ['COS_SECRET_KEY']
          bucket = os.environ['COS_BUCKET']
          region = os.environ['COS_REGION']

          if not secret_id or not secret_key or not bucket:
              print('COS 凭证未配置，跳过上传')
              exit(0)

          config = CosConfig(Region=region, SecretId=secret_id, SecretKey=secret_key)
          client = CosS3Client(config)

          # 上传 index.html（必须设置 ContentType 否则浏览器会下载）
          print('📤 上传 index.html')
          with open('index.html', 'rb') as f:
              client.put_object(
                  Bucket=bucket, Key='index.html', Body=f,
                  ContentType='text/html; charset=utf-8'
              )

          # 上传所有 data/ 下的文件（含历史数据 + 今日新生成）
          uploaded = 0
          for root, dirs, files in os.walk('data'):
              for fname in files:
                  local = os.path.join(root, fname)
                  cos_key = local  # data/2026-05-23.json
                  size = os.path.getsize(local)
                  ct = {
                      '.json': 'application/json; charset=utf-8',
                      '.js': 'application/javascript; charset=utf-8',
                  }.get(os.path.splitext(fname)[1], 'application/octet-stream')
                  with open(local, 'rb') as f:
                      client.put_object(
                          Bucket=bucket, Key=cos_key, Body=f,
                          ContentType=ct
                      )
                  print(f'  ✅ {cos_key} ({size} bytes)')
                  uploaded += 1

          # 生成 manifest.json（供前端日历高亮用）
          import json as _json
          date_files = [f for f in os.listdir('data') if f.endswith('.json') and f != 'manifest.json']
          dates = sorted([f.replace('.json', '') for f in date_files])
          manifest = {'available_dates': dates, 'updated_at': os.popen('date -Iseconds').read().strip()}
          manifest_body = _json.dumps(manifest, ensure_ascii=False)
          client.put_object(
              Bucket=bucket, Key='data/manifest.json', Body=manifest_body.encode('utf-8'),
              ContentType='application/json; charset=utf-8'
          )
          print(f'  ✅ data/manifest.json ({len(dates)} dates)')

          # 同时生成 manifest.js（支持 file:// 协议本地打开）
          js_body = 'window.__agentSecManifest = ' + manifest_body + ';'
          client.put_object(
              Bucket=bucket, Key='data/manifest.js', Body=js_body.encode('utf-8'),
              ContentType='application/javascript; charset=utf-8'
          )
          print(f'  ✅ data/manifest.js ({len(dates)} dates)')

          print(f'✅ COS 上传完成（共 {uploaded} 个文件 + manifest）')
          "

      - name: 数据备份到 Git 仓库
        if: steps.crawl.outputs.data_exists == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 拉取远程最新（防止冲突）
          git pull --rebase origin master

          # 只提交 data/ 目录
          if git diff --quiet data/; then
            echo "📦 data/ 无变化，跳过提交"
          else
            TODAY=$(date '+%Y-%m-%d')
            git add data/
            git commit -m "data: 自动备份 ${TODAY} 安全数据"
            git push "https://${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git" master
            echo "✅ 已备份到 Git 仓库"
          fi

      - name: 发送告警（失败时）
        if: failure() || steps.crawl.outputs.data_exists != 'true'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL}" ]; then
            echo "⚠️  未配置 ALERT_WEBHOOK_URL，跳过告警"
            exit 0
          fi

          TODAY=$(date '+%Y-%m-%d %H:%M')
          ACTION_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # 自动识别通知渠道
          if echo "${ALERT_WEBHOOK_URL}" | grep -q "sctapi.ftqq.com"; then
            # Server 酱（推送到微信）
            TITLE="【Agent安全监控】${TODAY} 执行失败"
            DESP="日期: ${TODAY}\n详情: ${ACTION_URL}\n请检查 LLM API 或 GitHub Token 是否正常"
            curl -s -X POST "${ALERT_WEBHOOK_URL}" \
              -d "title=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${TITLE}'))")" \
              -d "desp=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${DESP}'))")"
            echo "✅ 已通过 Server 酱推送微信通知"
          elif echo "${ALERT_WEBHOOK_URL}" | grep -q "pushplus"; then
            # PushPlus（推送到微信）
            curl -s -X POST "${ALERT_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"【Agent安全监控】执行失败\",\"content\":\"<p>日期: ${TODAY}</p><p><a href='${ACTION_URL}'>查看详情</a></p>\"}"
            echo "✅ 已通过 PushPlus 推送通知"
          else
            # 企业微信 / 钉钉 / 飞书 机器人
            curl -s -X POST "${ALERT_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{
                \"msgtype\": \"text\",
                \"text\": {
                  \"content\": \"【Agent 安全监控】执行失败\n${TODAY}\n${ACTION_URL}\"
                }
              }"
            echo "✅ 已通过 Webhook 推送通知"
          fi
